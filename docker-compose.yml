services:
  web:
    container_name: f8k13-full-web
    image: node:24
    working_dir: /app/web
    volumes:
      - './web:/app/web'
    env_file:
      - .env
    command: ['sh', '-c', 'npm install && npm run dev']

  api:
    container_name: f8k13-full-api
    image: node:24
    working_dir: /app/api
    volumes:
      - './api:/app/api'
    env_file:
      - .env
    depends_on:
      - db
    command: ['sh', '-c', 'npm install && npm run start:dev']

  db:
    container_name: f8k13-full-db
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=default
    volumes:
      - './db:/var/lib/postgresql/data'

  nginx:
    image: nginx:latest
    container_name: f8k13-full-nginx
    ports:
      - '80:80'   # HTTP port
      - '443:443' # HTTPS port
    environment:
      - DOMAIN=${VITE_DOMAIN}
    volumes:
      - './nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro'
      - './certbot/www:/var/www/html/certbot:ro'
      - './certbot/conf:/etc/letsencrypt:ro'
    depends_on:
      - web
      - api
    restart: unless-stopped
    command: /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    volumes:
      - './certbot/www:/var/www/html/certbot'
      - './certbot/conf:/etc/letsencrypt'
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    restart: unless-stopped
